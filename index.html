<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academic Vault Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-blue: #0ea5e9;
            --magic-purple: #8b5cf6;
            --door-wood: #1e293b;
            --accent-gold: #f59e0b;
            --bg: #0f172a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }

        body {
            background-color: var(--bg);
            color: white;
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            perspective: 2000px;
        }

        /* --- Background Effect --- */
        .magic-smoke {
            position: absolute;
            width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, #1e1b4b 0%, #020617 100%);
            z-index: -1;
        }

        /* --- Layout --- */
        .app-container {
            display: flex;
            width: 100%;
            height: 100vh;
            padding: 15px;
            gap: 15px;
            z-index: 10;
        }

        /* --- Sidebar Navigation --- */
        .sidebar {
            width: 280px;
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 25px;
            border: 1px solid rgba(255,255,255,0.1);
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            overflow-y: auto; /* Allows scrolling if list is long */
            scrollbar-width: thin;
            scrollbar-color: var(--primary-blue) transparent;
        }

        .header h1 { font-size: 1.4rem; font-weight: 800; color: var(--primary-blue); }
        .header p { font-size: 0.7rem; color: #94a3b8; margin-bottom: 25px; }

        .btn-stack { display: flex; flex-direction: column; gap: 10px; flex-grow: 1; }

        .class-btn {
            all: unset;
            padding: 12px 18px;
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            cursor: pointer;
            font-weight: 700;
            color: #cbd5e1;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid transparent;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .class-btn:hover {
            background: rgba(14, 165, 233, 0.1);
            border-color: var(--primary-blue);
            transform: scale(1.03);
        }

        .class-btn.active {
            background: var(--primary-blue);
            color: white;
            box-shadow: 0 0 30px rgba(14, 165, 233, 0.5);
        }

        /* --- The 3D Doors --- */
        .stage {
            flex: 1;
            position: relative;
            background: #000;
            border-radius: 30px;
            overflow: hidden;
            transform-style: preserve-3d;
        }

        .door-gate {
            position: absolute;
            width: 100%; height: 100%;
            display: flex;
            z-index: 50;
            pointer-events: none;
        }

        .door-panel {
            width: 50%; height: 100%;
            background: var(--door-wood);
            border: 4px solid #452a16;
            transition: transform 1.5s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            box-shadow: inset 0 0 100px rgba(0,0,0,0.7);
            background-image: repeating-linear-gradient(90deg, transparent, transparent 20px, rgba(0,0,0,0.1) 21px);
        }

        .door-l { transform-origin: left; border-radius: 30px 0 0 30px; justify-content: flex-end; padding-right: 15px; }
        .door-r { transform-origin: right; border-radius: 0 30px 30px 0; justify-content: flex-start; padding-left: 15px; }

        .gold-knob { width: 16px; height: 60px; background: radial-gradient(#fbbf24, #b45309); border-radius: 8px; border: 2px solid #78350f; }

        .is-open .door-l { transform: rotateY(-115deg); }
        .is-open .door-r { transform: rotateY(115deg); }

        /* Door Text */
        .door-l::after {
            content: "OPEN";
            position: absolute;
            right: -35px;
            font-weight: 800;
            font-size: 1.2rem;
            color: var(--accent-gold);
            transform: rotate(-90deg);
            opacity: 0.4;
        }

        .door-r::after {
            content: "VAULT";
            position: absolute;
            left: -35px;
            font-weight: 800;
            font-size: 1.2rem;
            color: var(--accent-gold);
            transform: rotate(90deg);
            opacity: 0.4;
        }

        /* --- Content Frame --- */
        .content-frame { width: 100%; height: 100%; background: white; z-index: 5; }
        iframe { width: 100%; height: 100%; border: none; }

        /* --- Explosion Particles --- */
        .funny-particle {
            position: fixed;
            font-size: 24px;
            pointer-events: none;
            z-index: 9999;
            animation: burpOut 1.5s forwards cubic-bezier(0.12, 0.85, 0.61, 1);
        }

        @keyframes burpOut {
            0% { transform: translate(0, 0) scale(0) rotate(0deg); opacity: 1; }
            100% { transform: translate(var(--dx), var(--dy)) scale(1.5) rotate(720deg); opacity: 0; }
        }

        /* --- Mobile --- */
        @media (max-width: 768px) {
            .app-container { flex-direction: column; padding: 10px; }
            .sidebar { 
                width: 100%; 
                height: 90px; 
                flex-direction: row; 
                padding: 10px; 
                overflow-x: auto; 
                overflow-y: hidden;
            }
            .header { display: none; }
            .btn-stack { flex-direction: row; margin: 0; }
            .class-btn { white-space: nowrap; padding: 8px 15px; }
            .is-open .door-l { transform: translateX(-100%); }
            .is-open .door-r { transform: translateX(100%); }
            .door-l::after, .door-r::after { display: none; }
        }
    </style>
</head>
<body>

    <div class="magic-smoke"></div>

    <div class="app-container" id="wrapper">
        <aside class="sidebar">
            <div class="header">
                <h1>VaultPortal</h1>
                <p>Academic Resources</p>
            </div>
            
            <nav class="btn-stack">
                <!-- Nursery, LKG, UKG Added Here -->
                <button class="class-btn" onclick="openVault('nursery', this)">Nursery</button>
                <button class="class-btn" onclick="openVault('lkg', this)">LKG</button>
                <button class="class-btn" onclick="openVault('ukg', this)">UKG</button>
                
                <!-- Class 1 to 6 -->
                <button class="class-btn" onclick="openVault('class1', this)">Class 1</button>
                <button class="class-btn" onclick="openVault('class2', this)">Class 2</button>
                <button class="class-btn" onclick="openVault('class3', this)">Class 3</button>
                <button class="class-btn" onclick="openVault('class4', this)">Class 4</button>
                <button class="class-btn" onclick="openVault('class5', this)">Class 5</button>
                <button class="class-btn" onclick="openVault('class6', this)">Class 6</button>
            </nav>
        </aside>

        <main class="stage">
            <div class="door-gate">
                <div class="door-panel door-l"><div class="gold-knob"></div></div>
                <div class="door-panel door-r"><div class="gold-knob"></div></div>
            </div>

            <div class="content-frame">
                <iframe id="portal-frame" src=""></iframe>
            </div>
        </main>
    </div>

    <script>
        // REPLACE THE "YOUR_FOLDER_ID_HERE" WITH THE ACTUAL GOOGLE DRIVE FOLDER IDs
        const folderLinks = {
            nursery: "YOUR_FOLDER_ID_HERE",
            lkg: "YOUR_FOLDER_ID_HERE",
            ukg: "YOUR_FOLDER_ID_HERE",
            class1: "YOUR_FOLDER_ID_HERE",
            class2: "YOUR_FOLDER_ID_HERE",
            class3: "1-HtrxaEr9-HVWHgdb8LQ_Nt9b3vWKZKC",
            class4: "YOUR_FOLDER_ID_HERE",
            class5: "YOUR_FOLDER_ID_HERE",
            class6: "YOUR_FOLDER_ID_HERE"
        };

        function openVault(id, btn) {
            const wrapper = document.getElementById('wrapper');
            const frame = document.getElementById('portal-frame');

            // 1. Particle Explosion Effect
            const emojis = ['📚', '✏️', '🎓', '📝', '📂', '✨', '🍎', '🖍️'];
            const rect = btn.getBoundingClientRect();

            for(let i=0; i<15; i++) {
                const p = document.createElement('div');
                p.className = 'funny-particle';
                p.innerText = emojis[Math.floor(Math.random() * emojis.length)];
                p.style.left = (rect.left + rect.width/2) + 'px';
                p.style.top = (rect.top + rect.height/2) + 'px';
                p.style.setProperty('--dx', (Math.random() - 0.5) * 500 + 'px');
                p.style.setProperty('--dy', (Math.random() - 0.5) * 500 + 'px');
                document.body.appendChild(p);
                setTimeout(() => p.remove(), 1500);
            }

            // 2. Active Button State
            document.querySelectorAll('.class-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            // 3. Trigger Door Animation
            wrapper.classList.add('is-open');

            // 4. Update Iframe Source
            const folderId = folderLinks[id];
            frame.src = `https://drive.google.com/embeddedfolderview?id=${folderId}#grid`;
        }
    </script>
</body>
</html>
