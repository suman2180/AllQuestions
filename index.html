<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GenieVault — Question Papers Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;900&family=Plus+Jakarta+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════
   TOKENS
═══════════════════════════════════════════ */
:root {
  --bg:          #06080f;
  --surface:     rgba(10,14,28,0.9);
  --border:      rgba(120,100,220,0.18);
  --gold:        #e9b84a;
  --gold-dim:    #a07820;
  --teal:        #00d4c8;
  --violet:      #7c3aed;
  --violet-lt:   #a78bfa;
  --smoke:       #38bdf8;
  --ruby:        #f43f5e;
  --txt:         #e2e8f0;
  --txt-dim:     #64748b;
  --sidebar-w:   280px;
  --r:           20px;
}

/* ═══════════════════════════════════════════
   RESET & BASE
═══════════════════════════════════════════ */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; overflow:hidden; }
body {
  font-family: 'Plus Jakarta Sans', sans-serif;
  background: var(--bg);
  color: var(--txt);
  display: flex;
}

/* ═══════════════════════════════════════════
   BACKGROUND
═══════════════════════════════════════════ */
.bg-canvas {
  position: fixed; inset: 0; z-index: 0; overflow: hidden;
}
.bg-canvas::before {
  content: '';
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse 80% 60% at 70% 40%, rgba(124,58,237,0.22) 0%, transparent 70%),
    radial-gradient(ellipse 50% 50% at 20% 80%, rgba(0,212,200,0.12) 0%, transparent 60%),
    radial-gradient(ellipse 40% 40% at 85% 85%, rgba(233,184,74,0.08) 0%, transparent 60%),
    #06080f;
}
/* animated star field */
.bg-canvas::after {
  content: '';
  position: absolute; inset: 0;
  background-image:
    radial-gradient(circle, rgba(255,255,255,0.7) 1px, transparent 1px),
    radial-gradient(circle, rgba(255,255,255,0.4) 1px, transparent 1px);
  background-size: 120px 120px, 60px 60px;
  background-position: 0 0, 30px 30px;
  animation: starDrift 60s linear infinite;
  opacity: 0.25;
}
@keyframes starDrift { to { background-position: 120px 120px, 150px 150px; } }

/* ═══════════════════════════════════════════
   LAYOUT
═══════════════════════════════════════════ */
.shell {
  position: relative;
  display: flex;
  width: 100%; height: 100vh;
  padding: 14px;
  gap: 14px;
  z-index: 10;
}

/* ═══════════════════════════════════════════
   SIDEBAR
═══════════════════════════════════════════ */
.sidebar {
  width: var(--sidebar-w);
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  background: var(--surface);
  backdrop-filter: blur(28px) saturate(180%);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 22px 16px 18px;
  gap: 6px;
  box-shadow: 0 0 0 1px rgba(255,255,255,0.03) inset, 0 24px 64px rgba(0,0,0,0.7);
  overflow: hidden;
  position: relative;
}

/* sidebar accent glow */
.sidebar::before {
  content:'';
  position:absolute;
  top:-60px; left:50%;
  transform: translateX(-50%);
  width:160px; height:160px;
  background: radial-gradient(circle, rgba(124,58,237,0.35) 0%, transparent 70%);
  pointer-events:none;
}

.brand {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 0 6px 16px;
  border-bottom: 1px solid rgba(255,255,255,0.05);
  margin-bottom: 8px;
}

.brand-gem {
  width: 36px; height: 36px; flex-shrink: 0;
  background: linear-gradient(135deg, var(--gold) 0%, var(--ruby) 100%);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.1rem;
  box-shadow: 0 0 16px rgba(233,184,74,0.5);
}

.brand-text h1 {
  font-family: 'Cinzel', serif;
  font-size: 1.05rem;
  font-weight: 900;
  background: linear-gradient(90deg, var(--gold), var(--violet-lt));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: 0.04em;
}
.brand-text p { font-size: 0.62rem; color: var(--txt-dim); margin-top: 2px; letter-spacing: 0.06em; }

.nav-sect-label {
  font-size: 0.58rem;
  font-weight: 700;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--txt-dim);
  padding: 0 10px 4px;
}

.class-btn {
  all: unset;
  position: relative;
  display: flex;
  align-items: center;
  gap: 11px;
  padding: 11px 14px;
  border-radius: 13px;
  cursor: pointer;
  font-size: 0.87rem;
  font-weight: 600;
  color: var(--txt-dim);
  border: 1px solid transparent;
  transition: all 0.22s cubic-bezier(0.4,0,0.2,1);
  overflow: hidden;
  user-select: none;
  -webkit-user-select: none;
}
.class-btn::after {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(90deg, rgba(124,58,237,0.08), rgba(0,212,200,0.06));
  opacity: 0;
  transition: opacity 0.22s;
}
.class-btn:hover {
  color: #c4b5fd;
  border-color: rgba(124,58,237,0.3);
  background: rgba(124,58,237,0.08);
  transform: translateX(5px);
}
.class-btn:hover::after { opacity: 1; }

.class-btn.active {
  background: linear-gradient(115deg, rgba(124,58,237,0.55), rgba(0,212,200,0.25));
  border-color: rgba(124,58,237,0.5);
  color: #fff;
  box-shadow: 0 0 24px rgba(124,58,237,0.35), 0 4px 12px rgba(0,0,0,0.4);
  transform: translateX(5px);
}

.btn-icon {
  width: 28px; height: 28px; flex-shrink: 0;
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.95rem;
  background: rgba(255,255,255,0.06);
  transition: background 0.2s;
}
.class-btn.active .btn-icon { background: rgba(255,255,255,0.15); }

.btn-label { flex: 1; }
.btn-chevron {
  font-size: 0.7rem;
  opacity: 0;
  transform: translateX(-4px);
  transition: opacity 0.2s, transform 0.2s;
  color: var(--violet-lt);
}
.class-btn:hover .btn-chevron,
.class-btn.active .btn-chevron { opacity: 1; transform: translateX(0); }

.sidebar-foot {
  margin-top: auto;
  padding-top: 14px;
  border-top: 1px solid rgba(255,255,255,0.04);
  font-size: 0.6rem;
  color: rgba(255,255,255,0.12);
  text-align: center;
  font-family: 'Cinzel', serif;
  letter-spacing: 0.08em;
}

/* ═══════════════════════════════════════════
   STAGE (main panel)
═══════════════════════════════════════════ */
.stage {
  flex: 1;
  position: relative;
  border-radius: var(--r);
  overflow: hidden;
  background: #000;
  transform-style: preserve-3d;
  box-shadow: 0 0 0 1px rgba(255,255,255,0.04) inset, 0 24px 80px rgba(0,0,0,0.8);
}

/* ── GENIE SCENE (empty state) ── */
.genie-scene {
  position: absolute; inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 30;
  gap: 0;
  transition: opacity 0.6s ease, transform 0.6s ease;
  background:
    radial-gradient(ellipse 70% 50% at 50% 60%, rgba(124,58,237,0.18) 0%, transparent 70%),
    radial-gradient(ellipse 40% 30% at 50% 90%, rgba(0,212,200,0.1) 0%, transparent 70%),
    #06080f;
  pointer-events: none;
}
.is-open .genie-scene { opacity: 0; transform: scale(0.96); pointer-events: none; }

/* ── CORNER MASCOT ── */
.genie-mascot {
  position: absolute;
  bottom: 14px;
  right: 14px;
  z-index: 60;
  pointer-events: none;
  display: flex;
  flex-direction: column;
  align-items: center;
  opacity: 0;
  transform: translateY(30px) scale(0.6);
  transition: opacity 0.7s cubic-bezier(0.34,1.56,0.64,1) 1s,
              transform 0.7s cubic-bezier(0.34,1.56,0.64,1) 1s;
}
.is-open .genie-mascot {
  opacity: 1;
  transform: translateY(0) scale(1);
}
.mascot-inner {
  width: 110px;
  height: 136px;
  position: relative;
}
.mascot-inner svg {
  width: 100%; height: 100%;
  overflow: visible;
  filter:
    drop-shadow(0 0 14px rgba(124,58,237,0.85))
    drop-shadow(0 0 30px rgba(0,212,200,0.3));
}
.mascot-platform {
  width: 76px; height: 12px;
  background: radial-gradient(ellipse, rgba(124,58,237,0.6) 0%, transparent 72%);
  border-radius: 50%;
  margin-top: -2px;
  animation: mpulse 3s ease-in-out infinite;
}
@keyframes mpulse {
  0%,100% { transform: scaleX(1);    opacity: 0.65; }
  50%      { transform: scaleX(1.25); opacity: 1;    }
}

.genie-title {
  font-family: 'Cinzel', serif;
  font-size: 2rem;
  font-weight: 900;
  letter-spacing: 0.18em;
  background: linear-gradient(90deg, var(--gold), #fff 50%, var(--violet-lt));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 8px;
  text-align: center;
  filter: drop-shadow(0 0 12px rgba(233,184,74,0.6)) drop-shadow(0 0 24px rgba(124,58,237,0.4));
  animation: titleShimmer 4s ease-in-out infinite;
  background-size: 200% 100%;
}
@keyframes titleShimmer {
  0%,100% { background-position: 0% 50%; }
  50%     { background-position: 100% 50%; }
}
.genie-sub {
  font-size: 0.85rem;
  color: var(--txt-dim);
  text-align: center;
  letter-spacing: 0.08em;
  font-style: italic;
  opacity: 0.85;
}

/* ═══════════════════════════════════════════
   THE ADVANCED GENIE SVG
═══════════════════════════════════════════ */
.genie-wrap {
  position: relative;
  width: 300px;
  height: 360px;
}

.genie-svg {
  width: 100%; height: 100%;
  overflow: visible;
  filter:
    drop-shadow(0 0 30px rgba(124,58,237,0.7))
    drop-shadow(0 0 60px rgba(0,212,200,0.3));
}

/* breathing body */
.genie-body-group { animation: breathe 4s ease-in-out infinite; transform-origin: 130px 180px; }
@keyframes breathe {
  0%,100% { transform: scaleY(1) scaleX(1); }
  50%      { transform: scaleY(1.025) scaleX(0.985); }
}

/* ═══ MAGIC ENHANCEMENTS ═══ */

/* magic portal circle — rotates clockwise */
.magic-circle { animation: mcSpin 22s linear infinite; transform-origin: 130px 285px; }
.magic-circle-rev { animation: mcSpin 14s linear infinite reverse; transform-origin: 130px 285px; }
@keyframes mcSpin { to { transform: rotate(360deg); } }

/* halo behind the head */
.halo-glow { animation: haloPulse 4s ease-in-out infinite; transform-origin: 130px 80px; }
@keyframes haloPulse {
  0%,100% { transform: scale(1);    opacity: 0.7;  }
  50%     { transform: scale(1.12); opacity: 1;    }
}

/* cape wave */
.cape-wave { animation: capeSway 5s ease-in-out infinite; transform-origin: 130px 200px; }
@keyframes capeSway {
  0%,100% { transform: skewX(-2deg) translateX(0); }
  50%     { transform: skewX(2deg)  translateX(2px); }
}

/* star twinkle */
.twinkle { animation: twinkle 2.4s ease-in-out infinite; transform-origin: center; }
.twinkle.t2 { animation-delay: .4s; }
.twinkle.t3 { animation-delay: .8s; }
.twinkle.t4 { animation-delay: 1.2s; }
.twinkle.t5 { animation-delay: 1.6s; }
.twinkle.t6 { animation-delay: 2.0s; }
@keyframes twinkle {
  0%,100% { opacity: .2; transform: scale(.7); }
  50%     { opacity: 1;  transform: scale(1.3); }
}

/* rising magic motes */
.mote {
  position: absolute;
  width: 10px; height: 10px;
  border-radius: 50%;
  pointer-events: none;
  filter: blur(0.5px);
  box-shadow: 0 0 8px currentColor;
  animation: moteRise var(--d, 6s) linear infinite var(--delay, 0s);
}
@keyframes moteRise {
  0%   { transform: translateY(0)    scale(0.6); opacity: 0; }
  15%  { opacity: 1; }
  85%  { opacity: 1; }
  100% { transform: translateY(-220px) scale(1.2); opacity: 0; }
}

/* energy tendrils around orb */
.tendril { animation: tendrilSpin 3s ease-in-out infinite; transform-origin: 213px 135px; }
@keyframes tendrilSpin {
  0%,100% { transform: rotate(0deg)   scale(1);    opacity: .55; }
  50%     { transform: rotate(180deg) scale(1.15); opacity: 1;   }
}

/* floating runes */
.rune { animation: runeFloat 6s ease-in-out infinite; transform-origin: center; }
.rune.r2 { animation-delay: 1.5s; }
.rune.r3 { animation-delay: 3s; }
.rune.r4 { animation-delay: 4.5s; }
@keyframes runeFloat {
  0%,100% { transform: translateY(0)   rotate(0deg);  opacity: .35; }
  50%     { transform: translateY(-14px) rotate(8deg); opacity: .9;  }
}

/* inner scene radial — more dramatic */
.genie-scene {
  background:
    radial-gradient(ellipse 55% 40% at 50% 55%, rgba(233,184,74,0.18) 0%, transparent 60%),
    radial-gradient(ellipse 80% 60% at 50% 55%, rgba(124,58,237,0.32) 0%, transparent 65%),
    radial-gradient(ellipse 50% 30% at 50% 92%, rgba(0,212,200,0.18) 0%, transparent 70%),
    radial-gradient(ellipse 30% 25% at 50% 30%, rgba(244,114,182,0.10) 0%, transparent 70%),
    #06080f !important;
}

/* ═══ STATE MACHINE — play / sleep / eat ═══ */

/* hide all state-specific overlays by default */
.state-only { display: none !important; }
.genie-wrap[data-state="play"]  .state-play  { display: block !important; }
.genie-wrap[data-state="sleep"] .state-sleep { display: block !important; }
.genie-wrap[data-state="eat"]   .state-eat   { display: block !important; }
.genie-wrap[data-state="sleep"] .state-hide-when-sleep { display: none !important; }
.genie-wrap[data-state="eat"]   .state-hide-when-eat   { display: none !important; }
.genie-wrap[data-state="play"]  .state-hide-when-play  { display: none !important; }

/* ── PLAY: bouncy, energetic, orb juggles ── */
.genie-wrap[data-state="play"].genie-float {
  animation: playBounce 0.9s cubic-bezier(0.45,0,0.55,1) infinite;
}
@keyframes playBounce {
  0%,100% { transform: translateY(0); }
  50%     { transform: translateY(-40px); }
}
.genie-wrap[data-state="play"] .genie-sway  { animation-duration: 1.4s; }
.genie-wrap[data-state="play"] .genie-body-group { animation-duration: 1.2s; }
.genie-wrap[data-state="play"] .orb-glow {
  animation: orbToss 0.9s cubic-bezier(0.45,0,0.55,1) infinite;
  transform-origin: 213px 135px;
}
@keyframes orbToss {
  0%   { transform: translate(0,0)        rotate(0deg)   scale(1.1);  }
  20%  { transform: translate(-20px,-45px) rotate(180deg) scale(1.3);  }
  40%  { transform: translate(0,-60px)    rotate(360deg) scale(1.4);  }
  60%  { transform: translate(20px,-45px)  rotate(540deg) scale(1.3);  }
  80%  { transform: translate(10px,-10px) rotate(630deg) scale(1.1);  }
  100% { transform: translate(0,0)        rotate(720deg) scale(1.1);  }
}
.genie-wrap[data-state="play"] .jewel-spark { animation-duration: .5s; }
.genie-wrap[data-state="play"] .twinkle    { animation-duration: .8s; }
.genie-wrap[data-state="play"] .mote       { animation-duration: 2.5s; }
.genie-wrap[data-state="play"] .magic-circle { animation-duration: 12s; }
.genie-wrap[data-state="play"] .magic-circle-rev { animation-duration: 8s; }

/* ── SLEEP: calm, eyes closed, Zzz ── */
.genie-wrap[data-state="sleep"].genie-float {
  animation: sleepSlump 5s ease-in-out infinite;
}
@keyframes sleepSlump {
  0%,100% { transform: translateY(8px) rotate(-1.5deg); }
  50%     { transform: translateY(18px) rotate(1.5deg); }
}
.genie-wrap[data-state="sleep"] .genie-sway  { animation: none; transform: rotate(0); }
.genie-wrap[data-state="sleep"] .genie-body-group {
  animation: sleepBreathe 5s ease-in-out infinite;
  transform-origin: 130px 200px;
}
@keyframes sleepBreathe {
  0%,100% { transform: scaleY(1.01) scaleX(0.99) rotate(8deg); }
  50%     { transform: scaleY(1.02) scaleX(0.98) rotate(4deg); }
}
.genie-wrap[data-state="sleep"] .orb-glow { animation: none; opacity: 0.25; }
.genie-wrap[data-state="sleep"] .aura-ring { animation-duration: 30s; opacity: 0.4; }
.genie-wrap[data-state="sleep"] .jewel-spark { animation-duration: 4s; opacity: 0.5; }
.genie-wrap[data-state="sleep"] .twinkle   { animation-duration: 7s; opacity: 0.4; }
.genie-wrap[data-state="sleep"] .halo-glow { animation-duration: 7s; }
.genie-wrap[data-state="sleep"] .wisp      { animation-duration: 9s; opacity: 0.3; }
.genie-wrap[data-state="sleep"] .mote      { animation-duration: 12s; opacity: 0.3; }
.genie-wrap[data-state="sleep"] .magic-circle     { animation-duration: 45s; opacity: 0.5; }
.genie-wrap[data-state="sleep"] .magic-circle-rev { animation-duration: 30s; opacity: 0.5; }

@keyframes zRise {
  0%   { transform: translate(0,0)    scale(0.6); opacity: 0; }
  20%  { opacity: 1; }
  100% { transform: translate(20px,-60px) scale(1.2); opacity: 0; }
}
.genie-z {
  font-family: 'Cinzel', serif;
  font-weight: 900;
  fill: #a78bfa;
  filter: drop-shadow(0 0 6px rgba(167,139,250,0.9));
  transform-origin: center;
  animation: zRise 3s ease-in-out infinite;
}
.genie-z.z2 { animation-delay: 1s; font-size: 16px; }
.genie-z.z3 { animation-delay: 2s; font-size: 12px; }

/* ── EAT: arm brings cookie to mouth ── */
.genie-wrap[data-state="eat"] .arm-r {
  animation: armToMouth 2s ease-in-out infinite;
  transform-origin: 177px 155px;
}
@keyframes armToMouth {
  0%, 100% { transform: rotate(0deg); }
  35%, 55% { transform: rotate(-110deg); }
}
.genie-wrap[data-state="eat"] .orb-glow {
  animation: none;
  opacity: 0.15;
  transform: translate(-40px, 40px) scale(0.4);
}
.genie-wrap[data-state="eat"] .genie-food {
  animation: foodChomp 2s ease-in-out infinite;
  transform-origin: 213px 148px;
}
@keyframes foodChomp {
  0%, 30%  { transform: scale(1);   opacity: 1; }
  50%      { transform: scale(0.4); opacity: 0.9; }
  65%, 100%{ transform: scale(0);   opacity: 0; }
}
.genie-wrap[data-state="eat"] .genie-mouth-open {
  animation: chomp 0.4s ease-in-out infinite;
  transform-origin: 130px 123px;
}
@keyframes chomp {
  0%, 100% { transform: scaleY(1); }
  50%      { transform: scaleY(0.5); }
}
.genie-wrap[data-state="eat"] .genie-sway  { animation-duration: 4s; }
.genie-wrap[data-state="eat"].genie-float { animation-duration: 3s; }

/* ── STATUS LABEL ── */
.genie-status {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 6px 16px;
  background: rgba(124,58,237,0.18);
  border: 1px solid rgba(124,58,237,0.35);
  border-radius: 999px;
  font-size: 0.68rem;
  color: var(--violet-lt);
  letter-spacing: 0.16em;
  text-transform: uppercase;
  font-family: 'Cinzel', serif;
  font-weight: 700;
  margin-top: 12px;
  backdrop-filter: blur(8px);
  transition: all 0.4s ease;
}
.genie-status .status-dot {
  width: 7px; height: 7px;
  background: var(--violet-lt);
  border-radius: 50%;
  animation: dotPulse 1.4s ease-in-out infinite;
  box-shadow: 0 0 8px currentColor;
}
.genie-status[data-state="play"]  { color: #fde68a; border-color: rgba(253,230,138,0.4); background: rgba(233,184,74,0.12); }
.genie-status[data-state="play"]  .status-dot { background: #fde68a; }
.genie-status[data-state="sleep"] { color: #7dd3fc; border-color: rgba(125,211,252,0.4); background: rgba(56,189,248,0.10); }
.genie-status[data-state="sleep"] .status-dot { background: #7dd3fc; animation-duration: 2.5s; }
.genie-status[data-state="eat"]   { color: #f472b6; border-color: rgba(244,114,182,0.4); background: rgba(244,114,182,0.10); }
.genie-status[data-state="eat"]   .status-dot { background: #f472b6; }
@keyframes dotPulse {
  0%,100% { opacity: 0.4; transform: scale(0.8); }
  50%     { opacity: 1;   transform: scale(1.3); }
}

/* ── MASCOT state mirroring (lighter) ── */
.mascot-inner[data-state="play"]  .genie-body-group { animation-duration: 1.6s; }
.mascot-inner[data-state="play"]  .genie-sway       { animation-duration: 1.8s; }
.mascot-inner[data-state="play"]  .orb-glow         { animation: orbToss 1.2s ease-in-out infinite; transform-origin: 213px 135px; }
.mascot-inner[data-state="sleep"] .genie-sway       { animation: none; transform: rotate(0); }
.mascot-inner[data-state="sleep"] .genie-body-group { animation-duration: 6s; }
.mascot-inner[data-state="sleep"] .orb-glow         { animation: none; opacity: 0.25; }
.mascot-inner[data-state="sleep"] .twinkle          { animation-duration: 7s; opacity: 0.4; }
.mascot-inner[data-state="eat"]   .arm-r            { animation: armToMouth 2s ease-in-out infinite; transform-origin: 179px 153px; }
.mascot-inner[data-state="eat"]   .orb-glow         { animation: none; opacity: 0.2; transform: translate(-30px,30px) scale(0.6); }

/* floating up/down */
.genie-float { animation: floatUp 5s ease-in-out infinite; }
@keyframes floatUp {
  0%,100% { transform: translateY(0px); }
  50%      { transform: translateY(-18px); }
}

/* gentle sway */
.genie-sway { animation: sway 6s ease-in-out infinite; transform-origin: 130px 300px; }
@keyframes sway {
  0%,100% { transform: rotate(-2deg); }
  50%      { transform: rotate(2deg); }
}

/* blink */
.lid-l, .lid-r { animation: blink 5s ease-in-out infinite; transform-origin: center; }
.lid-r { animation-delay: 0.07s; }
@keyframes blink {
  0%,92%,100% { transform: scaleY(1); }
  95%          { transform: scaleY(0.05); }
}

/* orb pulse */
.orb-glow { animation: orbPulse 2.5s ease-in-out infinite; transform-origin: 52px 180px; }
@keyframes orbPulse {
  0%,100% { transform: scale(1); opacity: 0.85; }
  50%      { transform: scale(1.18); opacity: 1; }
}

/* smoke wisps */
.wisp { animation: wispRise var(--d, 4s) ease-in-out infinite var(--delay, 0s); }
@keyframes wispRise {
  0%   { transform: translateY(0) scaleX(1); opacity: 0.5; }
  50%  { transform: translateY(-12px) scaleX(1.1); opacity: 0.9; }
  100% { transform: translateY(0) scaleX(1); opacity: 0.5; }
}

/* turban jewel sparkle */
.jewel-spark { animation: sparkle 2s ease-in-out infinite; transform-origin: 130px 50px; }
@keyframes sparkle {
  0%,100% { opacity: 0.7; transform: scale(1) rotate(0deg); }
  50%      { opacity: 1;   transform: scale(1.4) rotate(20deg); }
}

/* arm raise on hover (scoped to genie-wrap) */
.genie-wrap:hover .arm-r { animation: armRaise 0.5s ease forwards; }
@keyframes armRaise {
  to { transform: rotate(-30deg); transform-origin: 170px 175px; }
}

/* particle ring */
.aura-ring { animation: auraRotate 8s linear infinite; transform-origin: 130px 200px; }
@keyframes auraRotate { to { transform: rotate(360deg); } }

/* ── DOOR GATE ── */
.door-gate {
  position: absolute; inset: 0;
  display: flex;
  z-index: 50;
  pointer-events: none;
}

.door-panel {
  width: 50%; height: 100%;
  transition: transform 1.5s cubic-bezier(0.77,0,0.175,1);
  position: relative;
  overflow: hidden;
}

/* ornate door design */
.door-panel::before {
  content: '';
  position: absolute; inset: 0;
  background:
    linear-gradient(180deg,
      rgba(30,12,60,0.0) 0%,
      rgba(20,8,45,1) 100%),
    repeating-linear-gradient(0deg,
      transparent, transparent 28px,
      rgba(124,58,237,0.06) 29px),
    repeating-linear-gradient(90deg,
      transparent, transparent 28px,
      rgba(124,58,237,0.04) 29px);
  background-color: #0d0820;
}

/* gold border filigree */
.door-panel::after {
  content: '';
  position: absolute;
  top: 8%; bottom: 8%;
  width: 3px;
  background: linear-gradient(180deg,
    transparent, var(--gold-dim), var(--gold), var(--gold-dim), transparent);
  box-shadow: 0 0 12px rgba(233,184,74,0.6);
}
.door-l::after { right: 0; }
.door-r::after { left: 0; }

.door-l { transform-origin: left center; border-radius: var(--r) 0 0 var(--r); }
.door-r { transform-origin: right center; border-radius: 0 var(--r) var(--r) 0; }

/* door arch decoration (CSS only) */
.door-l .door-deco, .door-r .door-deco {
  position: absolute;
  inset: 12px;
  border: 1px solid rgba(124,58,237,0.2);
  border-radius: 12px;
  pointer-events: none;
}
.door-knob {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  width: 12px; height: 50px;
  background: linear-gradient(180deg, #fde68a, #b45309 50%, #fde68a);
  border-radius: 6px;
  box-shadow: 0 0 12px rgba(233,184,74,0.7), 0 2px 4px rgba(0,0,0,0.5);
}
.door-l .door-knob { right: 14px; }
.door-r .door-knob { left: 14px; }

.is-open .door-l { transform: rotateY(-118deg); }
.is-open .door-r { transform: rotateY(118deg); }

/* ── CONTENT FRAME ── */
.content-frame {
  position: absolute; inset: 0;
  z-index: 5;
  background: white;
}
.content-frame iframe { width:100%; height:100%; border:none; display:block; }

/* ── FRAME LOADING ── */
.frame-loading {
  position: absolute; inset: 0;
  z-index: 6;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  background:
    radial-gradient(ellipse 60% 50% at 50% 50%, rgba(124,58,237,0.15) 0%, transparent 70%),
    #06080f;
  transition: opacity 0.5s ease;
}
.frame-loading.done { opacity:0; pointer-events:none; }

.loading-orb {
  width: 56px; height: 56px;
  border-radius: 50%;
  background: radial-gradient(circle at 35% 35%, #a78bfa, var(--violet));
  box-shadow: 0 0 30px rgba(124,58,237,0.8), 0 0 60px rgba(124,58,237,0.4);
  animation: orbSpin 1.4s cubic-bezier(0.68,-0.55,0.27,1.55) infinite;
}
@keyframes orbSpin {
  0%   { transform: scale(0.7) rotate(0deg); box-shadow: 0 0 20px rgba(124,58,237,0.6); }
  50%  { transform: scale(1.2) rotate(180deg); box-shadow: 0 0 50px rgba(124,58,237,1), 0 0 80px rgba(0,212,200,0.4); }
  100% { transform: scale(0.7) rotate(360deg); box-shadow: 0 0 20px rgba(124,58,237,0.6); }
}
.loading-text {
  font-family: 'Cinzel', serif;
  font-size: 0.78rem;
  letter-spacing: 0.1em;
  color: var(--violet-lt);
}

/* ── PARTICLES ── */
.spark {
  position: fixed;
  pointer-events: none;
  z-index: 9999;
  border-radius: 50%;
  animation: sparkFly var(--dur, 1.2s) forwards cubic-bezier(0.12,0.85,0.61,1);
}
@keyframes sparkFly {
  0%   { transform: translate(0,0) scale(1); opacity: 1; }
  100% { transform: translate(var(--dx), var(--dy)) scale(0); opacity: 0; }
}

<script>
/* ── floating animation on genie wrapper ── */
document.getElementById('genieWrap').classList.add('genie-float');

/* ── eye tracking ── */
document.addEventListener('mousemove', e => {
  const ids = ['eye-l-pupil','eye-r-pupil'];
  // using querySelector instead since IDs differ per eye structure
  // eyes are the circle.fill=#0c1a2e inside each eye group
  const pupils = document.querySelectorAll('.genie-svg circle[fill="#0c1a2e"]');
  pupils.forEach(p => {
    const rect = p.closest('svg').getBoundingClientRect();
    // get attribute-based center
    const cx = parseFloat(p.getAttribute('cx'));
    const cy = parseFloat(p.getAttribute('cy'));
    // convert viewBox coords to screen
    const svgEl = p.closest('svg');
    const vb = svgEl.viewBox.baseVal;
    const scaleX = rect.width  / vb.width;
    const scaleY = rect.height / vb.height;
    const screenX = rect.left + cx * scaleX;
    const screenY = rect.top  + cy * scaleY;
    const angle = Math.atan2(e.clientY - screenY, e.clientX - screenX);
    const dist  = 3;
    p.setAttribute('cx', cx + Math.cos(angle) * dist);
    p.setAttribute('cy', cy + Math.sin(angle) * dist);
  });
});

/* ── spark colors ── */
const SPARKS = [
  '#a78bfa','#38bdf8','#e9b84a','#f472b6',
  '#34d399','#f87171','#fde68a','#7dd3fc'
];

/* ═══ GENIE STATE MACHINE ═══ */
const STATES = {
  idle:  { label: '✨ Awaiting', dur: [3500, 5500] },
  play:  { label: '🎭 Playing',  dur: [5000, 8000] },
  sleep: { label: '💤 Sleeping', dur: [6000, 9000] },
  eat:   { label: '🍪 Munching', dur: [4000, 6000] }
};
let currentState = 'idle';
let stateTimer = null;

function setGenieState(name) {
  if (!STATES[name]) return;
  currentState = name;
  const targets = document.querySelectorAll('.genie-wrap, .mascot-inner');
  targets.forEach(w => w.dataset.state = name);
  const statusEl = document.getElementById('genieStatus');
  const textEl   = document.getElementById('statusText');
  if (statusEl) statusEl.dataset.state = name;
  if (textEl)   textEl.textContent = STATES[name].label;
}

function scheduleNextState() {
  if (stateTimer) clearTimeout(stateTimer);
  const others = Object.keys(STATES).filter(s => s !== currentState);
  const next   = others[Math.floor(Math.random() * others.length)];
  const [lo, hi] = STATES[next].dur;
  setGenieState(next);
  stateTimer = setTimeout(scheduleNextState, lo + Math.random() * (hi - lo));
}

/* start the state cycle */
setGenieState('idle');
scheduleNextState();

let doorsOpen = false;

/* ── main vault open ── */
function openVault(el) {
  const btn = el.closest('[data-id]');
  if (!btn) return;

  const folderId = btn.dataset.id;
  const loading  = document.getElementById('frameLoading');
  const frame    = document.getElementById('portal-frame');

  /* active state */
  document.querySelectorAll('.class-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  /* spark burst from button */
  const r = btn.getBoundingClientRect();
  const ox = r.left + r.width  / 2;
  const oy = r.top  + r.height / 2;
  for (let i = 0; i < 22; i++) {
    const s  = document.createElement('div');
    const sz = 4 + Math.random() * 8;
    s.className = 'spark';
    s.style.cssText = `
      left:${ox}px; top:${oy}px;
      width:${sz}px; height:${sz}px;
      background:${SPARKS[i % SPARKS.length]};
      box-shadow: 0 0 ${sz*2}px ${SPARKS[i % SPARKS.length]};
      --dx:${(Math.random()-0.5)*420}px;
      --dy:${(Math.random()-0.5)*420}px;
      --dur:${0.8 + Math.random()*0.7}s;
    `;
    document.body.appendChild(s);
    setTimeout(() => s.remove(), 1600);
  }

  /* load iframe */
  loading.classList.remove('done');
  frame.src = `https://drive.google.com/embeddedfolderview?id=${folderId}#grid`;

  /* open doors once */
  if (!doorsOpen) {
    document.getElementById('wrapper').classList.add('is-open');
    doorsOpen = true;
  }
}

function onFrameLoad() {
  const f = document.getElementById('portal-frame');
  if (f.src && f.src !== window.location.href) {
    document.getElementById('frameLoading').classList.add('done');
  }
}
</script>
